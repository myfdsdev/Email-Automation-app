# Render Blueprint - Email Automation
# Deploy: Render Dashboard -> New -> Blueprint -> pick this repo.
#
# Topology (same-origin: ONE web service serves both the API and the SPA)
#   web    : Express API + the built React SPA on one origin
#   worker : BullMQ background processor (sending, sequences, Gmail sync, webhooks)
#
# Why same-origin rather than a separate static site for the frontend. A split deploy
# puts the SPA and API on different domains, which forces all of the following, each
# of which fails silently when wrong:
#   - COOKIE_SAMESITE=none, because browsers drop a SameSite=Lax cookie cross-site
#     (login returns 200, the next call 401s, and the app loops back to /login);
#   - VITE_API_URL baked into the build at build time, pointing at the API's exact host;
#   - CLIENT_URL on the API so CORS admits the frontend origin;
#   - an SPA rewrite rule on the static host, or every deep link, refresh and OAuth
#     return 404s -- including the Gmail callback's /integrations?gmail=connected.
#     Render only accepts that rule from its dashboard or the `routes` key below;
#     a Netlify-style _redirects file is served as a plain asset and does nothing.
# Serving the SPA from Express removes all four, and does not depend on third-party
# cookies, which browsers are actively restricting.
#
# Datastores are managed and live outside this blueprint:
#   MONGODB_URI -> MongoDB Atlas
#   REDIS_URL   -> Upstash / Redis Cloud (use the rediss:// TLS URL)
#
# Secrets in `email-automation-shared` are generated ONCE and injected into both
# services. This is deliberate: web and worker must agree on the JWT and credential
# encryption keys, and per-service generateValue would mint different values, leaving
# the worker unable to decrypt the Gmail tokens the web service stored.

envVarGroups:
  - name: email-automation-shared
    envVars:
      # --- generated once by Render, shared by both services ---
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true

      # --- you must supply these (Render prompts on first deploy) ---
      # Must be 64 hex chars. Generate:
      #   node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      # Treat like a root password: if it changes, every stored Gmail/Brevo credential
      # becomes undecryptable ("Unsupported state or unable to authenticate data") and
      # each integration must be disconnected and reconnected.
      - key: EMAIL_CREDENTIAL_ENCRYPTION_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false

      # --- integrations (optional; leave blank to disable that feature) ---
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_PUBSUB_TOPIC
        sync: false
      - key: GOOGLE_PUBSUB_SUBSCRIPTION
        sync: false
      - key: BREVO_WEBHOOK_SECRET
        sync: false
      # Gemini powers the AI features. Optional: without it, reply classification
      # falls back to heuristics. Get one at https://aistudio.google.com/apikey
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

services:
  # ---------------------------------------------------------------- web (API + SPA)
  - type: web
    name: email-automation-web
    runtime: node
    plan: starter
    region: oregon
    branch: main
    # Installs the server, then builds the React app into client/dist, which
    # server/app.js serves when SERVE_CLIENT is true.
    buildCommand: npm run render:build:web
    # Builds the schema indexes before the new version takes traffic. Required because
    # autoIndex is off in production, and this schema uses unique indexes to enforce
    # correctness (duplicate-send prevention, per-workspace contact uniqueness).
    preDeployCommand: npm run db:indexes
    startCommand: npm run start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - fromGroup: email-automation-shared
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      # Heavy jobs belong to the worker service, never the request path.
      - key: RUN_WORKERS
        value: "false"
      # Express serves client/dist, including the SPA history fallback, so no static
      # host and no rewrite rule are involved.
      - key: SERVE_CLIENT
        value: "true"
      # Same-origin, so 'lax' is correct. It also lets the Gmail OAuth return
      # redirect carry the session cookie, which 'strict' would withhold.
      - key: COOKIE_SAMESITE
        value: lax
      # CLIENT_URL / API_URL / GOOGLE_REDIRECT_URI / GOOGLE_LOGIN_REDIRECT_URI are
      # intentionally omitted: the app derives them from RENDER_EXTERNAL_URL, which
      # Render injects with the https scheme. Override only for a custom domain.

  # ---------------------------------------------------------------- worker
  - type: worker
    name: email-automation-worker
    runtime: node
    plan: starter
    region: oregon
    branch: main
    # No client build here - the worker never serves HTTP.
    buildCommand: npm run render:build:worker
    startCommand: npm run start:worker
    autoDeploy: true
    envVars:
      - fromGroup: email-automation-shared
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: RUN_WORKERS
        value: "true"
      - key: SERVE_CLIENT
        value: "false"
      # A worker has no external URL of its own, so links inside outbound emails
      # need the web service's public address explicitly.
      - key: CLIENT_URL
        sync: false # e.g. https://email-automation-web.onrender.com

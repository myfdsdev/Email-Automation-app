# Render Blueprint - Email Automation
# Deploy: Render Dashboard -> New -> Blueprint -> pick this repo.
#
# Topology (split: static frontend + API on separate origins)
#   client : Render Static Site serving the built React SPA
#   web    : Express API only
#   worker : BullMQ background processor (sending, sequences, Gmail sync, webhooks)
#
# Because the client and API are on different domains, every API call is cross-site.
# That forces two things, and the setup silently breaks without either:
#   1. COOKIE_SAMESITE=none on the API  - browsers drop a SameSite=Lax cookie
#      cross-site, so login would appear to succeed and then bounce back to /login.
#   2. CLIENT_URL on the API set to the static site origin, so CORS admits it.
#
# A single same-origin web service (SERVE_CLIENT=true, no static site) avoids both and
# does not depend on third-party cookies, which browsers are actively restricting.
# See DEPLOYMENT.md if you want to collapse this back to one service.
#
# Datastores are managed and live outside this blueprint:
#   MONGODB_URI -> MongoDB Atlas
#   REDIS_URL   -> Upstash / Redis Cloud (use the rediss:// TLS URL)
#
# Secrets in `email-automation-shared` are generated ONCE and injected into both
# services. This is deliberate: web and worker must agree on the JWT and credential
# encryption keys, and per-service generateValue would mint different values, leaving
# the worker unable to decrypt the Gmail tokens the web service stored.

envVarGroups:
  - name: email-automation-shared
    envVars:
      # --- generated once by Render, shared by both services ---
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true

      # --- you must supply these (Render prompts on first deploy) ---
      # Must be 64 hex chars. Generate:
      #   node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      # Treat like a root password: if lost, every stored Gmail/Brevo credential
      # becomes undecryptable and integrations must be reconnected.
      - key: EMAIL_CREDENTIAL_ENCRYPTION_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false

      # --- integrations (optional; leave blank to disable that feature) ---
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_PUBSUB_TOPIC
        sync: false
      - key: GOOGLE_PUBSUB_SUBSCRIPTION
        sync: false
      - key: BREVO_WEBHOOK_SECRET
        sync: false
      # Gemini powers the AI features. Optional: without it, reply classification
      # falls back to heuristics. Get one at https://aistudio.google.com/apikey
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

services:
  # ---------------------------------------------------------------- client (SPA)
  - type: web
    name: email-automation-client
    runtime: static
    branch: main
    buildCommand: npm run render:build:client
    staticPublishPath: ./client/dist
    autoDeploy: true
    # Without this rewrite the static host looks for a real file at /dashboard and
    # returns 404 on deep links and refreshes. Every SPA path must serve index.html.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Baked into the bundle at BUILD time (Vite inlines VITE_* as constants), so
      # changing this needs a rebuild, not a restart. Must be the API's origin with
      # scheme and no trailing slash, e.g. https://email-automation-app-zp54.onrender.com
      - key: VITE_API_URL
        sync: false

  # ---------------------------------------------------------------- API
  - type: web
    name: email-automation-web
    runtime: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: npm run render:build:api
    # Builds the schema indexes before the new version takes traffic. Required because
    # autoIndex is off in production, and this schema uses unique indexes to enforce
    # correctness (duplicate-send prevention, per-workspace contact uniqueness).
    preDeployCommand: npm run db:indexes
    startCommand: npm run start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - fromGroup: email-automation-shared
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      # Heavy jobs belong to the worker service, never the request path.
      - key: RUN_WORKERS
        value: "false"
      # The static site serves the SPA, so the API must not.
      - key: SERVE_CLIENT
        value: "false"
      # REQUIRED for the split. The client is on another domain, so the session cookie
      # is cross-site; browsers only send those when SameSite=None (and Secure, which
      # Render's HTTPS satisfies). With the default 'lax' the cookie is silently
      # dropped: login returns 200, the next call 401s, and the app loops to /login.
      - key: COOKIE_SAMESITE
        value: none
      # REQUIRED for the split: puts the static site's origin in the CORS allowlist.
      # Set to the client URL, e.g. https://email-automation-app-1.onrender.com
      - key: CLIENT_URL
        sync: false
      # API_URL / GOOGLE_REDIRECT_URI are derived from RENDER_EXTERNAL_URL, which
      # Render injects with the https scheme. Override only for a custom domain.

  - type: worker
    name: email-automation-worker
    runtime: node
    plan: starter
    region: oregon
    branch: main
    # No client build here - the worker never serves HTTP.
    buildCommand: npm run render:build:worker
    startCommand: npm run start:worker
    autoDeploy: true
    envVars:
      - fromGroup: email-automation-shared
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: RUN_WORKERS
        value: "true"
      - key: SERVE_CLIENT
        value: "false"
      # A worker has no external URL of its own, so links inside outbound emails
      # need the web service's public address explicitly.
      - key: CLIENT_URL
        sync: false # set to your web service URL, e.g. https://email-automation-web.onrender.com
